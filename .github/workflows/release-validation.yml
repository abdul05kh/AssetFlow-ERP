name: Production Release Validation

on:
  push:
    tags:
      - 'v*' # Trigger on release tags (e.g., v1.0.0)
  workflow_dispatch: # Support manual triggers

env:
  DATABASE_URL: "file:${{ github.workspace }}/prisma/dev.db"
  JWT_SECRET: "super-secret-jwt-key-for-test-environments"
  JWT_REFRESH_SECRET: "super-secret-jwt-refresh-key-for-test-environments"
  PORT: 4000
  NODE_ENV: test
  NEXT_PUBLIC_API_URL: "http://127.0.0.1:4000/api/v1"

jobs:
  release-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Monorepo Dependencies
        run: npm ci

      - name: Run ESLint Checks
        run: npm run lint

      - name: Validate Prisma Schema
        run: npx prisma validate --schema=prisma/schema.prisma

      - name: Generate Prisma Client
        run: npx prisma generate --schema=prisma/schema.prisma

      - name: Run Schema Push & Migrations
        run: npx prisma db push --schema=prisma/schema.prisma --force-reset --accept-data-loss

      - name: Seed Database Records
        run: npx ts-node apps/api/src/seed.ts

      - name: Build Workspaces
        run: npm run build

      - name: Run Integration Tests
        run: npm run test --workspace=apps/api

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E Browser Tests
        run: npx playwright test --config=apps/web/playwright.config.ts

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Verify Docker API Build
        run: docker build -f docker/Dockerfile.api -t assetflow-api:test .

      - name: Verify Docker Web Build
        run: docker build -f docker/Dockerfile.web -t assetflow-web:test .

      - name: Create Release Telemetry Artifacts
        run: |
          mkdir -p build-reports
          echo "Release validation checks completed successfully on $(date)" > build-reports/summary.txt
          echo "Commit: ${{ github.sha }}" >> build-reports/summary.txt

      - name: Upload Release Summary Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-validation-report
          path: build-reports/
